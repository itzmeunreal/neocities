<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unreal's sketchbook</title>
    <link rel="icon" type="image/png" href="https://itzmeunreal.neocities.org/images/icon.png">
    <link rel="stylesheet" href="https://itzmeunreal.neocities.org/test/style.css">
    <base target="_top">
</head>
<body>
<div class="content">
    <div class="navbar-items">
        <span class="navbar-page-text">unreal's sketchbook</span>
        <div class="nav-dropdown">
            <button class="label">
                <img src="https://itzmeunreal.neocities.org/images/home.png" width="16" height="16" class="label-icon-space">
                main
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="https://itzmeunreal.neocities.org/test/" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/home.png" width="14" height="14" class="label-icon-space">
                    home
                </a>
                <a href="https://itzmeunreal.neocities.org/test/about.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/about.png" width="14" height="14" class="label-icon-space">
                    about
                </a>
                <a href="https://itzmeunreal.neocities.org/test/works.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/work.png" width="14" height="14" class="label-icon-space">
                    works
                </a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="label label-primary">
                <img src="https://itzmeunreal.neocities.org/images/joystick.png" width="16" height="16" class="label-icon-space">
                entertainment
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="https://itzmeunreal.neocities.org/test/music.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/music.png" width="14" height="14" class="label-icon-space">
                    music player
                </a>
                <a href="https://itzmeunreal.neocities.org/test/arcade.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/joystick.png" width="14" height="14" class="label-icon-space">
                    arcade
                </a>
                <a href="https://itzmeunreal.neocities.org/test/paint.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/sketch.png" width="14" height="14" class="label-icon-space">
                    sketchbook
                </a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="label">
                <img src="https://itzmeunreal.neocities.org/images/community1.png" width="16" height="16" class="label-icon-space">
                community
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="https://itzmeunreal.neocities.org/test/forum.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/forum.png" width="14" height="14" class="label-icon-space">
                    forum
                </a>
                <a href="https://itzmeunreal.neocities.org/test/chat.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/chat.png" width="14" height="14" class="label-icon-space">
                    chat room
                </a>
                <a href="https://itzmeunreal.neocities.org/test/guestbook.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/guestbook.png" width="14" height="14" class="label-icon-space">
                    guestbook
                </a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="label">
                <img src="https://itzmeunreal.neocities.org/images/extras.png" width="16" height="16" class="label-icon-space">
                extra
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="https://itzmeunreal.neocities.org/test/siteinfo.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/thisweb.png" width="14" height="14" class="label-icon-space">
                    site info
                </a>
                <a href="https://itzmeunreal.neocities.org/test/contributors.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/users.png" width="14" height="14" class="label-icon-space">
                    contributors
                </a>
                <a href="https://itzmeunreal.neocities.org/test/donate.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/donate.png" width="14" height="14" class="label-icon-space">
                    donate
                </a>
                <a href="https://gamesbefore.neocities.org/" class="dropdown-item">
                    <img src="https://gamesbefore.neocities.org/img/glungus.png" width="14" height="14" class="label-icon-space">
                    GLUNGUS
                </a>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="card card-padded">
            <p class="section-title">sketchbook</p>
            <div class="iframe-wrapper">
                <iframe src="https://jspaint.app" class="iframe" allowfullscreen></iframe>
            </div>
            <p class="sketch-credits">this is an external website created by <a href="https://github.com/1j01" target="_blank">isaiah odhner</a>, check out his github</p>
        </div>
        <div class="card card-padded">
            <p class="section-title">send me your drawing!</p>
            <p class="form-subtitle">save your creation and send it here :)</p>
            <form id="sketchForm" class="sketch-form">
                <input type="text" name="fi-sender-fullName" placeholder="your name or alias" required class="sketch-input">
                <input type="file" name="fi-file-drawing" accept="image/*" required class="sketch-input">
                <textarea name="fi-text-message" placeholder="say something about your drawing! (optional)" rows="3" class="sketch-input"></textarea>
                <button type="submit" class="label label-primary form-submit">send it!</button>
            </form>
            <p id="formStatus" class="form-status"></p>
        </div>
    </div>
</div>
<script src="https://forminit.com/sdk/v1/forminit.js"></script>
<script src="script.js"></script>
</body>
</html>
