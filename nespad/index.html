<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unreal's nespad</title>
    <link rel="icon" type="image/png" href="https://itzmeunreal.neocities.org/images/icon.png">
    <link rel="stylesheet" href="https://itzmeunreal.neocities.org/test/style.css">
    <link rel="stylesheet" href="nespad.css">
</head>
<body>
<div class="content">
    <div class="navbar-items">
        <span class="navbar-page-text">unreal's nespad</span>
        <div class="nav-dropdown">
            <button class="label">
                <img src="https://itzmeunreal.neocities.org/images/home.png" width="16" height="16" class="label-icon-space">
                main
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="/test/" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/home.png" width="14" height="14" class="label-icon-space">
                    home
                </a>
                <a href="/test/about.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/about.png" width="14" height="14" class="label-icon-space">
                    about
                </a>
                <a href="/test/works.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/work.png" width="14" height="14" class="label-icon-space">
                    works
                </a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="label label-primary">
                <img src="https://itzmeunreal.neocities.org/images/joystick.png" width="16" height="16" class="label-icon-space">
                entertainment
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="/test/music.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/music.png" width="14" height="14" class="label-icon-space">
                    music player
                </a>
                <a href="/test/arcade.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/joystick.png" width="14" height="14" class="label-icon-space">
                    arcade
                </a>
                <a href="/test/paint.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/sketch.png" width="14" height="14" class="label-icon-space">
                    sketchbook
                </a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="label">
                <img src="https://itzmeunreal.neocities.org/images/community1.png" width="16" height="16" class="label-icon-space">
                community
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="/test/forum.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/forum.png" width="14" height="14" class="label-icon-space">
                    forum
                </a>
                <a href="/test/chat.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/chat.png" width="14" height="14" class="label-icon-space">
                    chat room
                </a>
                <a href="/test/guestbook.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/guestbook.png" width="14" height="14" class="label-icon-space">
                    guestbook
                </a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="label">
                <img src="https://itzmeunreal.neocities.org/images/extras.png" width="16" height="16" class="label-icon-space">
                extra
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="/test/siteinfo.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/thisweb.png" width="14" height="14" class="label-icon-space">
                    site info
                </a>
                <a href="/test/contributors.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/users.png" width="14" height="14" class="label-icon-space">
                    contributors
                </a>
                <a href="/test/donate.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/donate.png" width="14" height="14" class="label-icon-space">
                    donate
                </a>
                <a href="https://gamesbefore.neocities.org/" class="dropdown-item">
                    <img src="https://gamesbefore.neocities.org/img/glungus.png" width="14" height="14" class="label-icon-space">
                    GLUNGUS
                </a>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="card card-padded">
            <p class="section-title">nespad</p>
            <div class="nespad-layout">
                <div class="nespad-left">
                    <p class="nespad-description">
                        lots of placeholder text here. placeholder slot placeholder slots text lolololol.
                    </p>
                    <a href="#" class="label label-primary nespad-download-btn">
                        download
                    </a>
                    <div class="nespad-controller-wrapper">
                        <div id="wrap">
                            <img id="nes" src="nes.svg">
                            <div id="btn-b"      class="overlay btn-circle"></div>
                            <div id="btn-a"      class="overlay btn-circle"></div>
                            <div id="btn-select" class="overlay btn-pill"></div>
                            <div id="btn-start"  class="overlay btn-pill"></div>
                            <div id="dpad-up"    class="overlay btn-dpad"></div>
                            <div id="dpad-down"  class="overlay btn-dpad"></div>
                            <div id="dpad-left"  class="overlay btn-dpad"></div>
                            <div id="dpad-right" class="overlay btn-dpad"></div>
                        </div>
                    </div>
                </div>
                <div class="nespad-right">
                    <div class="nespad-emu-wrapper">
                        <div id="game"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    EJS_player        = "#game";
    EJS_core          = "nestopia";
    EJS_gameName      = "super mario bros.";
    EJS_color         = "#e52222";
    EJS_startOnLoaded = true;
    EJS_pathtodata    = "https://cdn.emulatorjs.org/stable/data/";
    EJS_gameUrl       = "https://itzmeunreal.github.io/neocities/rom/Super%20Mario%20Bros.%20(Japan%2C%20USA).nes";
    EJS_disableLocalStorage = true;
    EJS_defaultControls = {
        "0": {
            "0": { "value": "37" },
            "2": { "value": "8"  },
            "3": { "value": "13" },
            "4": { "value": "87" },
            "5": { "value": "83" },
            "6": { "value": "65" },
            "7": { "value": "68" },
            "8": { "value": "40" }
        }
    };
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
