                <a href="/test/about.html" class="dropdown-item">

                <a href="/test/contributors.html" class="dropdown-item">

                    GLUNGUS
                </a>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="card card-padded">
            <p class="section-title">nespad</p>
            <div class="nespad-layout">
                <div class="nespad-left">
                    <p class="nespad-description">
                        lots of placeholder text here. placeholder slot placeholder slots text lolololol.
                    </p>
                    <a href="#" class="label label-primary nespad-download-btn">
                        download
                    </a>
                    <div class="nespad-controller-wrapper">
                        <div id="wrap">
                            <img id="nes" src="nes.svg">
                            <div id="btn-b"      class="overlay btn-circle"></div>
                            <div id="btn-a"      class="overlay btn-circle"></div>
                            <div id="btn-select" class="overlay btn-pill"></div>
                            <div id="btn-start"  class="overlay btn-pill"></div>
                            <div id="dpad-up"    class="overlay btn-dpad"></div>
                            <div id="dpad-down"  class="overlay btn-dpad"></div>
                            <div id="dpad-left"  class="overlay btn-dpad"></div>
                            <div id="dpad-right" class="overlay btn-dpad"></div>
                        </div>
                    </div>
                </div>
                <div class="nespad-right">
                    <div class="nespad-emu-wrapper">
                        <div id="game"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>

    EJS_core          = "nestopia";
    EJS_gameName      = "super mario bros.";

    EJS_startOnLoaded = true;
    EJS_pathtodata    = "https://cdn.emulatorjs.org/stable/data/";
    EJS_gameUrl       = "https://itzmeunreal.github.io/neocities/rom/Super%20Mario%20Bros.%20(Japan%2C%20USA).nes";
    EJS_disableLocalStorage = true;
    EJS_defaultControls = {
        0: {
            0:  { value: 'left arrow',  value2: 'BUTTON_2' },
            1:  { value: '',            value2: 'BUTTON_4' },
            2:  { value: 'backspace',   value2: 'SELECT'   },
            3:  { value: 'enter',       value2: 'START'    },

            5:  { value: 's',           value2: 'DPAD_DOWN'},
            6:  { value: 'a',           value2: 'DPAD_LEFT'},

            8:  { value: 'down arrow',  value2: 'BUTTON_1' },

            19: { value: '',            value2: 'LEFT_STICK_Y:-1' },
            20: { value: '',            value2: 'RIGHT_STICK_X:+1' },
            21: { value: '',            value2: 'RIGHT_STICK_X:-1' },
            22: { value: '',            value2: 'RIGHT_STICK_Y:+1' },
            23: { value: '',            value2: 'RIGHT_STICK_Y:-1' },
            24: { value: '1' },

            26: { value: '3' },

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
